<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <!-- Can body -->
  <rect x="20" y="20" width="80" height="160" rx="8" fill="#c0c0c0"/>
  <rect x="20" y="20" width="80" height="160" rx="8" fill="url(#rb-shine)" opacity="0.3"/>
  <!-- Blue top section -->
  <rect x="20" y="20" width="80" height="60" rx="8" fill="#1e3a8a"/>
  <rect x="20" y="70" width="80" height="10" fill="#1e3a8a"/>
  <!-- Red bottom accent -->
  <rect x="20" y="130" width="80" height="50" rx="0 0 8 8" fill="#dc2626"/>
  <rect x="20" y="170" width="80" height="10" rx="0 0 8 8" fill="#dc2626"/>
  <!-- Yellow diamond -->
  <polygon points="60,55 80,80 60,105 40,80" fill="#fbbf24"/>
  <!-- Red bulls silhouette -->
  <circle cx="50" cy="78" r="6" fill="#dc2626"/>
  <circle cx="70" cy="78" r="6" fill="#dc2626"/>
  <!-- Brand text area -->
  <rect x="30" y="110" width="60" height="14" rx="2" fill="#c0c0c0" opacity="0.3"/>
  <!-- Can top -->
  <ellipse cx="60" cy="22" rx="40" ry="6" fill="#a0a0a0"/>
  <ellipse cx="60" cy="22" rx="35" ry="4" fill="#d0d0d0"/>
  <!-- Pull tab -->
  <rect x="52" y="16" width="16" height="8" rx="4" fill="#888"/>
  <!-- Can bottom -->
  <ellipse cx="60" cy="178" rx="40" ry="5" fill="#999"/>
  <defs>
    <linearGradient id="rb-shine" x1="20" y1="0" x2="100" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
