<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 200" fill="none">
  <!-- Can body -->
  <rect x="15" y="30" width="50" height="155" rx="25" fill="#dc2626"/>
  <rect x="15" y="30" width="50" height="155" rx="25" fill="url(#pr-g)" opacity="0.3"/>
  <!-- Lid -->
  <ellipse cx="40" cy="30" rx="25" ry="8" fill="#b91c1c"/>
  <ellipse cx="40" cy="28" rx="23" ry="6" fill="#ef4444"/>
  <!-- Label band -->
  <rect x="18" y="70" width="44" height="60" fill="#fbbf24"/>
  <!-- Face circle -->
  <ellipse cx="40" cy="90" rx="15" ry="18" fill="#fde68a"/>
  <!-- Mustache -->
  <path d="M30 95 Q35 90 40 95 Q45 90 50 95" stroke="#451a03" stroke-width="1.5" fill="none"/>
  <!-- Eyes -->
  <circle cx="34" cy="85" r="2" fill="#1e1b4b"/>
  <circle cx="46" cy="85" r="2" fill="#1e1b4b"/>
  <!-- Brand text -->
  <text x="40" y="145" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="Arial, sans-serif">PRINGLES</text>
  <!-- Bottom -->
  <ellipse cx="40" cy="185" rx="25" ry="8" fill="#991b1b"/>
  <defs>
    <linearGradient id="pr-g" x1="15" y1="0" x2="65" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
</svg>
