<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <rect x="20" y="20" width="80" height="160" rx="8" fill="#16a34a"/>
  <rect x="20" y="20" width="80" height="160" rx="8" fill="url(#sp-shine)" opacity="0.3"/>
  <!-- Lemon/lime -->
  <circle cx="50" cy="80" r="15" fill="#a3e635" opacity="0.5"/>
  <circle cx="70" cy="85" r="12" fill="#fde047" opacity="0.5"/>
  <!-- Bubbles -->
  <circle cx="35" cy="60" r="3" fill="white" opacity="0.3"/>
  <circle cx="75" cy="50" r="2" fill="white" opacity="0.3"/>
  <circle cx="85" cy="70" r="2.5" fill="white" opacity="0.25"/>
  <circle cx="40" cy="120" r="2" fill="white" opacity="0.2"/>
  <!-- Brand -->
  <text x="60" y="135" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">Sprite</text>
  <ellipse cx="60" cy="22" rx="40" ry="6" fill="#15803d"/>
  <ellipse cx="60" cy="22" rx="35" ry="4" fill="#22c55e"/>
  <rect x="52" y="16" width="16" height="8" rx="4" fill="#999"/>
  <ellipse cx="60" cy="178" rx="40" ry="5" fill="#14532d"/>
  <defs>
    <linearGradient id="sp-shine" x1="20" y1="0" x2="100" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
