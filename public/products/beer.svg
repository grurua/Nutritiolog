<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" fill="none">
  <!-- Beer glass/mug -->
  <rect x="20" y="30" width="60" height="150" rx="5" fill="#f59e0b" opacity="0.8"/>
  <rect x="20" y="30" width="60" height="150" rx="5" fill="url(#br-s)" opacity="0.3"/>
  <!-- Foam -->
  <ellipse cx="50" cy="35" rx="32" ry="12" fill="#fef3c7"/>
  <ellipse cx="38" cy="30" rx="10" ry="8" fill="white" opacity="0.8"/>
  <ellipse cx="55" cy="28" rx="12" ry="9" fill="white" opacity="0.7"/>
  <ellipse cx="65" cy="32" rx="8" ry="7" fill="white" opacity="0.6"/>
  <!-- Handle -->
  <path d="M80 60 Q95 60 95 90 Q95 120 80 120" stroke="#d97706" stroke-width="6" fill="none"/>
  <!-- Bubbles -->
  <circle cx="35" cy="100" r="2" fill="white" opacity="0.3"/>
  <circle cx="55" cy="130" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="45" cy="80" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="60" cy="110" r="2" fill="white" opacity="0.2"/>
  <!-- Glass bottom -->
  <rect x="15" y="175" width="70" height="8" rx="3" fill="#b45309"/>
  <defs>
    <linearGradient id="br-s" x1="20" y1="0" x2="80" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
