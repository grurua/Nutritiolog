<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 200" fill="none">
  <!-- Can body -->
  <rect x="10" y="20" width="60" height="160" rx="5" fill="#15803d"/>
  <rect x="10" y="20" width="60" height="160" rx="5" fill="url(#hn-g)" opacity="0.3"/>
  <!-- Top -->
  <ellipse cx="40" cy="20" rx="30" ry="6" fill="#166534"/>
  <ellipse cx="40" cy="18" rx="28" ry="4" fill="#c0c0c0"/>
  <!-- Tab -->
  <ellipse cx="40" cy="16" rx="8" ry="3" fill="#a0a0a0"/>
  <!-- Silver band top -->
  <rect x="10" y="25" width="60" height="12" fill="#c0c0c0" opacity="0.6"/>
  <!-- Red star -->
  <polygon points="40,55 42,63 50,65 44,70 46,78 40,74 34,78 36,70 30,65 38,63" fill="#dc2626"/>
  <!-- Brand text -->
  <text x="40" y="100" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial, sans-serif">Heineken</text>
  <!-- Silver band bottom -->
  <rect x="10" y="160" width="60" height="10" fill="#c0c0c0" opacity="0.4"/>
  <!-- Bottom -->
  <ellipse cx="40" cy="180" rx="30" ry="6" fill="#14532d"/>
  <defs>
    <linearGradient id="hn-g" x1="10" y1="0" x2="70" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
</svg>
