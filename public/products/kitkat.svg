<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 90" fill="none">
  <!-- Two finger bars -->
  <!-- Bar 1 -->
  <rect x="15" y="25" width="45" height="45" rx="4" fill="#7c2d12"/>
  <rect x="15" y="25" width="45" height="45" rx="4" fill="url(#kk-g)" opacity="0.3"/>
  <!-- Bar 2 -->
  <rect x="70" y="25" width="45" height="45" rx="4" fill="#7c2d12"/>
  <rect x="70" y="25" width="45" height="45" rx="4" fill="url(#kk-g)" opacity="0.3"/>
  <!-- Wafer lines bar 1 -->
  <line x1="20" y1="37" x2="55" y2="37" stroke="#5b2c0e" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="47" x2="55" y2="47" stroke="#5b2c0e" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="57" x2="55" y2="57" stroke="#5b2c0e" stroke-width="1" opacity="0.4"/>
  <!-- Wafer lines bar 2 -->
  <line x1="75" y1="37" x2="110" y2="37" stroke="#5b2c0e" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="47" x2="110" y2="47" stroke="#5b2c0e" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="57" x2="110" y2="57" stroke="#5b2c0e" stroke-width="1" opacity="0.4"/>
  <!-- Red wrapper -->
  <rect x="10" y="30" width="110" height="30" rx="3" fill="#dc2626" opacity="0.9"/>
  <!-- Brand -->
  <text x="65" y="50" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial, sans-serif">KitKat</text>
  <defs>
    <linearGradient id="kk-g" x1="0" y1="25" x2="0" y2="70">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
